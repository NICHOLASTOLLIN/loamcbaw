<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wlc.lol - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Inter',sans-serif}
[data-theme="dark"]{--bg:#0a0a0a;--bg2:#0b0b0b;--bg3:#121212;--bg4:#1a1a1a;--bg5:#212121;--border:rgba(95,95,95,0.08);--border2:rgba(95,95,95,0.18);--text:#fff;--text2:#e4e4e7;--text3:#a1a1aa;--text4:#71717a;--text5:#52525b;background:#0a0a0a;color:#fff}
[data-theme="light"]{--bg:#f4f4f5;--bg2:#fafafa;--bg3:#fff;--bg4:#f0f0f0;--bg5:#e4e4e7;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#09090b;--text2:#18181b;--text3:#52525b;--text4:#71717a;--text5:#a1a1aa;background:#f4f4f5;color:#09090b}
:root{--orange:#f97316;--orange-light:rgba(249,115,22,0.15);--orange-border:rgba(249,115,22,0.5);--danger:#ef4444}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.wrap{width:100%;max-width:380px;padding:20px}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.logo-img{width:32px;height:32px;object-fit:contain;border-radius:6px}
.logo-text{font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--text)}
.logo-text .dot{color:var(--orange)}
.card{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:28px}
.card-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px}
.card-sub{font-size:13px;color:var(--text4);margin-bottom:22px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text4);margin-bottom:7px;display:block}
.form-input{width:100%;padding:10px 13px;background:var(--bg4);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--orange)}
.form-input::placeholder{color:var(--text5)}
.pw-wrap{position:relative}
.pw-wrap .form-input{padding-right:40px}
.pw-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text4);display:flex;align-items:center;padding:2px}
.pw-eye:hover{color:var(--text)}
.btn{width:100%;padding:11px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:'Inter',sans-serif;margin-top:6px}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{background:#ea6c0a}
.btn-orange:disabled{opacity:.6;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;color:var(--text5);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.footer-link{text-align:center;font-size:13px;color:var(--text4);margin-top:16px}
.footer-link a{color:var(--orange);text-decoration:none;font-weight:600}
.footer-link a:hover{text-decoration:underline}
.error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:9px;padding:10px 13px;font-size:13px;color:#fca5a5;margin-bottom:14px;display:none}
.success-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:9px;padding:10px 13px;font-size:13px;color:#86efac;margin-bottom:14px;display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <img class="logo-img" src="https://i.imgur.com/kj1LSyK.png" alt="WLC">
    <div class="logo-text">WLC<span class="dot">.</span>LOL</div>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginView">
    <div class="card">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to your wlc.lol account</div>
      <div class="error-msg" id="loginError"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
          <button class="pw-eye" type="button" onclick="togglePw('loginPassword',this)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn btn-orange" id="loginBtn" onclick="doLogin()">Sign In</button>
    </div>
    <div class="footer-link">Don't have an account? <a href="/register">Sign up</a></div>
  </div>
</div>

<script>
'use strict';

// If already logged in, redirect to dashboard
if(localStorage.getItem('wlc-token')){
  window.location.href = '/dashboard';
}

function togglePw(inputId, btn){
  var inp = document.getElementById(inputId);
  var show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
}

function showError(id, msg){
  var el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError(id){
  document.getElementById(id).style.display = 'none';
}

async function doLogin(){
  var email    = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  var btn      = document.getElementById('loginBtn');
  hideError('loginError');

  if(!email || !password){ showError('loginError','Please fill in all fields.'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    var res = await fetch('https://api.wlc.lol/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({email, password})
    });
    var data = await res.json();

    if(data.success && data.token){
      // ✅ Save token to localStorage — this is the key fix
      localStorage.setItem('wlc-token', data.token);
      window.location.href = '/dashboard';
    } else {
      showError('loginError', data.message || 'Invalid email or password.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch(e){
    showError('loginError', 'Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
